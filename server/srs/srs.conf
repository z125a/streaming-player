listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {
    # HTTP-FLV live streaming
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # HLS live streaming
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    # WebRTC
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
    }

    # DVR (live recording for VOD)
    dvr {
        enabled         off;
        dvr_path        ./objs/nginx/html/dvr/[app]/[stream].[timestamp].flv;
        dvr_plan        session;
    }

    # Transcoding (optional, requires FFmpeg in container)
    # Uncomment to enable multi-bitrate
    # transcode live {
    #     enabled     on;
    #     ffmpeg      /usr/local/bin/ffmpeg;
    #     engine 480p {
    #         enabled     on;
    #         vcodec      libx264;
    #         vbitrate    800;
    #         vfps        25;
    #         vwidth      854;
    #         vheight     480;
    #         acodec      aac;
    #         abitrate    64;
    #         output      rtmp://127.0.0.1:[port]/[app]/[stream]_480p;
    #     }
    # }
}
